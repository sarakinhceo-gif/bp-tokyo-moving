    <style>
        /* ----- RESET & BASE ----- */
        * {

        }

        body {

            color: #ffffff;
            font-family: Impact, system-ui, 'Arial Black', sans-serif;

        a {

        }
        a:hover {

        img {

        }

        ul {

        }

        /* ----- TYPOGRAPHY ----- */
        h1, h2, h3 {

        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .full-bleed {
            width: 100vw;
            margin-left: calc(-50vw + 50%);
        }

        /* ----- BRUTAL BORDERS & TEXTURES ----- */
        .brutal-border {
            border: 4px solid #ffffff;
            box-shadow: 8px 8px 0 #ff3b00;
        }

        .brutal-border-accent {
            border: 4px solid #ff3b00;
            box-shadow: 8px 8px 0 #ffffff;
        }

        .rotate-left {
            transform: rotate(-2deg);
        }
        .rotate-right {
            transform: rotate(2deg);
        }

        .skew-box {
            transform: skewX(-2deg);
            background: #0f0f0f;
            padding: 2rem;
        }

        /* ----- HEADER & NAV ----- */
        header {
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: #ffffff;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo span {
            color: #ff3b00;
            font-size: 2.8rem;
        }

        /* 네비게이션 (데스크탑) */
        .nav-desktop {
            display: flex;
            gap: 48px;
            align-items: center;
        }

        .nav-desktop a {
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 8px 16px;
            border: 2px solid transparent;
            transition: border 0.2s ease, color 0.2s ease;
        }

        .nav-desktop a:hover {
            border-bottom: 2px solid #ff3b00;
            color: #ff3b00;
        }

        .nav-cta {
            background: #ff3b00;
            color: #000000 !important;
            padding: 12px 24px !important;
            border: none !important;
            font-weight: 900;
            transition: background 0.2s ease;
        }
        .nav-cta:hover {
            background: #ffffff !important;
            color: #000000 !important;
        }

        /* 햄버거 메뉴 (모바일) */
        .nav-toggle {
            display: none;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 8px 0;
            background: none;
            border: none;
        }

        .hamburger span {
            display: block;
            width: 32px;
            height: 4px;
            background: #ffffff;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .nav-mobile {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding: 24px 48px;
            flex-direction: column;
            gap: 24px;
            z-index: 200;
        }

        .nav-mobile a {
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            padding: 12px 0;
            border-bottom: 2px solid #222;
        }

        .nav-mobile .nav-cta-mobile {
            background: #ff3b00;
            color: #000 !important;
            text-align: center;
            padding: 16px !important;
            border: none !important;
        }

        /* 체크박스 기반 토글 */
        #nav-toggle-input {
            display: none;
        }

        #nav-toggle-input:checked ~ .nav-mobile {
            display: flex;
        }

        #nav-toggle-input:checked + .hamburger span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }
        #nav-toggle-input:checked + .hamburger span:nth-child(2) {
            opacity: 0;
        }
        #nav-toggle-input:checked + .hamburger span:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -8px);
        }

        /* ----- HERO ----- */
        .hero {
            padding: 120px 48px 72px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at 30% 40%, #ff3b00 0%, transparent 70%);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
        }

        .hero h1 {
            font-size: clamp(4rem, 14vw, 9rem);
            line-height: 0.9;
            margin-bottom: 0.5rem;
            text-shadow: 6px 6px 0 #ff3b00;

            margin-bottom: 48px;
            color: #cccccc;

            border-left: 6px solid #ff3b00;
            padding-left: 24px;
        }

        .hero .cta-group {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-block;
            background: #ff3b00;
            color: #000000;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 16px 48px;
            border: 4px solid #ffffff;
            box-shadow: 6px 6px 0 #ffffff;
            text-transform: uppercase;
            transition: all 0.15s ease;
            transform: rotate(-1deg);
        }

        .btn-primary:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 6px 6px 0 #ff3b00;
            transform: rotate(0deg);
        }

        .btn-ghost {
            display: inline-block;
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 16px 32px;
            border: 4px solid #ffffff;
            color: #ffffff;
            transition: all 0.15s ease;
            text-transform: uppercase;
        }

        .btn-ghost:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ff3b00;
        }

        /* ----- REVIEW CARDS (UGC) ----- */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 48px;
            margin-top: 24px;
        }

        .review-card {
            background: #0f0f0f;
            border: 4px solid #ffffff;
            padding: 32px 24px;
            transform: rotate(var(--rot, 0deg));
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 8px 8px 0 #ff3b00;
        }

        .review-card:hover {
            transform: rotate(0deg) scale(1.02);
            box-shadow: 12px 12px 0 #ffffff;
        }

        .review-card:nth-child(odd) {
            --rot: -1.5deg;
        }
        .review-card:nth-child(even) {
            --rot: 1.5deg;
        }

        .review-card .review-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-family: system-ui, sans-serif;
            font-size: 0.9rem;
            color: #aaaaaa;
            border-bottom: 2px solid #333;
            padding-bottom: 12px;
        }

        .review-card .review-name {
            font-weight: 700;
            color: #ffffff;
            font-size: 1.1rem;
        }

        .review-card .review-date {
            font-size: 0.85rem;
        }

        .review-card .review-stars {
            color: #ff3b00;
            font-size: 1.6rem;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .review-card .review-text {
            font-family: system-ui, sans-serif;
            font-size: 1.05rem;
            line-height: 1.5;
            color: #dddddd;
        }

        .review-card .review-text::before {
            content: '“';
            font-size: 2rem;
            color: #ff3b00;
            margin-right: 4px;
        }
        .review-card .review-text::after {
            content: '”';
            font-size: 2rem;
            color: #ff3b00;
            margin-left: 4px;
        }

        /* ----- SECTION DIVIDERS ----- */
        .section-divider {
            width: 100%;
            height: 4px;
            background: #ff3b00;
            margin: 0;
            border: none;
            transform: skewY(-0.5deg);
        }

        /* ----- ASYMMETRIC BLOCKS & OVERLAPPING ----- */
        .asymmetric-grid {
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: 48px;
            align-items: start;
        }

        .asymmetric-grid .block-left {
            background: #0f0f0f;
            padding: 64px 48px;
            border: 4px solid #ff3b00;
            transform: rotate(-0.5deg);
            position: relative;
            z-index: 2;
        }

        .asymmetric-grid .block-right {
            background: #1a1a1a;
            padding: 48px 40px;
            border: 4px solid #ffffff;
            transform: rotate(1.5deg) translateY(-40px);
            position: relative;
            z-index: 1;
            box-shadow: -8px 8px 0 #ff3b00;
        }

        /* ----- FEATURE LIST (PBN 톤) ----- */
        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-family: system-ui, sans-serif;
            font-size: 1.2rem;
        }

        .feature-list li {
            display: flex;
            align-items: baseline;
            gap: 12px;
            border-bottom: 2px dashed #333;
            padding-bottom: 12px;
        }

        .feature-list li::before {
            content: '🔥';
            font-size: 1.4rem;
            color: #ff3b00;
        }

        /* ----- FOOTER ----- */
        footer {
            background: #000000;
            border-top: 4px solid #ff3b00;
            padding: 48px 48px 24px;
            display: flex;
            flex-direction: column;
            gap: 48px;
</body>
